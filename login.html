<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion | Panel EDAV - UAS</title>
    <link rel="icon" type="image/png" href="images/favicon.ico">
    <link rel="stylesheet" href="css/admin-shell.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

    <div class="login-shell">

        <!-- Panel izquierdo - marca institucional -->
        <aside class="login-brand-panel" aria-hidden="true">
            <div class="login-brand-overlay"></div>
            <div class="login-brand-content">
                <img src="images/LogoUas.png" alt="" class="login-brand-logo">
                <div class="login-brand-text">
                    <span class="login-brand-eyebrow">Universidad Autonoma de Sinaloa</span>
                    <h2 class="login-brand-title">Escuela de Diseno<br>y Artes Visuales</h2>
                    <p class="login-brand-sub">Panel administrativo para la gestion de noticias, eventos y asistente virtual institucional.</p>
                </div>
                <div class="login-brand-footer">
                    <span class="login-brand-year">&copy; <span id="loginYear"></span> UAS &middot; EDAV</span>
                </div>
            </div>
        </aside>

        <!-- Panel derecho - formulario -->
        <main class="login-form-panel">
            <div class="login-card">

                <header class="login-card-header">
                    <div class="login-card-mark">
                        <img src="images/LogoUas.png" alt="Logo UAS">
                    </div>
                    <h1 class="login-card-title">Iniciar sesion</h1>
                    <p class="login-card-sub">Ingresa tus credenciales para acceder al panel administrativo.</p>
                </header>

                <div id="alert" class="login-alert" role="alert" aria-live="polite"></div>

                <form id="loginForm" class="login-form" novalidate>
                    <div class="form-field">
                        <label class="form-label" for="usuario">
                            <i class="fas fa-user" aria-hidden="true"></i>
                            Usuario
                        </label>
                        <input
                            type="text"
                            id="usuario"
                            name="usuario"
                            class="form-input"
                            placeholder="Tu nombre de usuario"
                            autocomplete="username"
                            required>
                    </div>

                    <div class="form-field">
                        <label class="form-label" for="password">
                            <i class="fas fa-lock" aria-hidden="true"></i>
                            Contrasena
                        </label>
                        <div class="password-wrap">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                placeholder="Tu contrasena"
                                autocomplete="current-password"
                                required>
                            <button
                                type="button"
                                class="password-toggle"
                                aria-label="Mostrar u ocultar contrasena"
                                onclick="togglePassword()">
                                <i class="fas fa-eye" id="passwordToggleIcon" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-accent btn-login">
                        <span class="btn-login-text">
                            <i class="fas fa-arrow-right-to-bracket" aria-hidden="true"></i>
                            Entrar al panel
                        </span>
                        <span class="btn-login-spinner" aria-hidden="true">
                            <i class="fas fa-circle-notch fa-spin"></i>
                        </span>
                    </button>
                </form>

                <footer class="login-card-footer">
                    <a href="index.html" class="login-back-link">
                        <i class="fas fa-arrow-left" aria-hidden="true"></i>
                        Volver al sitio publico
                    </a>
                </footer>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('loginYear').textContent = new Date().getFullYear();
    </script>
    <script src="js/login.js"></script>
</body>
</html>
